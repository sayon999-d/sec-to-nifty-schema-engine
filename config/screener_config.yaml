screeners:
  quality_compounder:
    name: Quality Compounder
    rules:
      return_on_equity_pct:
        op: gt
        value: 15
      debt_to_equity:
        op: lt
        value: 1.0
      free_cash_flow_cr:
        op: gt
        value: 0
      revenue_cagr_5yr:
        op: gt
        value: 10
  value_pick:
    name: Value Pick
    rules:
      pe_ratio:
        op: lt
        value: 20
      pb_ratio:
        op: lt
        value: 3.0
      debt_to_equity:
        op: lt
        value: 2.0
      dividend_yield_pct:
        op: gt
        value: 1
  growth_accelerator:
    name: Growth Accelerator
    rules:
      pat_cagr_5yr:
        op: gt
        value: 20
      revenue_cagr_5yr:
        op: gt
        value: 15
      debt_to_equity:
        op: lt
        value: 2.0
  dividend_champion:
    name: Dividend Champion
    rules:
      dividend_yield_pct:
        op: gt
        value: 2
      dividend_payout_ratio_pct:
        op: lt
        value: 80
      free_cash_flow_cr:
        op: gt
        value: 0
  debt_free_blue_chip:
    name: Debt-Free Blue Chip
    rules:
      debt_to_equity:
        op: eq
        value: 0
      return_on_equity_pct:
        op: gt
        value: 12
      revenue_cr:
        op: gt
        value: 5000
  turnaround_watch:
    name: Turnaround Watch
    rules:
      revenue_cagr_3yr:
        op: gt
        value: 10
      latest_free_cash_flow_positive:
        op: eq
        value: true
      debt_to_equity_yoy_declining:
        op: eq
        value: true
